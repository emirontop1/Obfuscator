<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Basit Luau Obfuscator</title>
    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: #fff; padding: 20px; }
        textarea { width: 100%; height: 200px; background: #2d2d2d; color: #a9dc76; border: 1px solid #444; font-family: monospace; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; background: #fc5c65; border: none; color: white; cursor: pointer; margin: 10px 0; font-weight: bold; }
        button:hover { background: #ff7675; }
    </style>
</head>
<body>
    <h2>Luau Obfuscator</h2>
    <p>Temiz Kodunu Buraya Yapıştır:</p>
    <textarea id="inputCode">local mesaj = "Merhaba Dunya"\nprint(mesaj)</textarea>
    
    <button onclick="startObfuscation()">Kodu Karıştır!</button>
    
    <p>Karıştırılmış (Obfuscated) Kod:</p>
    <textarea id="outputCode" readonly></textarea>

    <script src="obfuscator.js"></script>
</body>
</html>
