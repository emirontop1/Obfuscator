<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Python Luau VM Obfuscator</title>
    <link rel="stylesheet" href="https://pyscript.net/snapshots/2023.11.1/core.css" />
    <script type="module" src="https://pyscript.net/snapshots/2023.11.1/core.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
        textarea { width: 100%; height: 180px; background: #1e1e1e; color: #50fa7b; border: 1px solid #333; font-family: monospace; padding: 12px; box-sizing: border-box; border-radius: 6px; }
        button { padding: 12px 24px; background: #bd93f9; border: none; color: #121212; cursor: pointer; margin: 15px 0; font-weight: bold; border-radius: 4px; }
        button:hover { background: #ff79c6; }
        h2 { color: #bd93f9; }
        .status { color: #ffb86c; font-family: monospace; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Luau VM Obfuscator (Python Powered)</h2>
    <p>Kaynak Lua Kodunu Yazın:</p>
    <textarea id="inputCode">print("Python VM Obfuscator Calisiyor!")</textarea>
    
    <button onclick="bridgeExecute()">Python ile VM Koduna Dönüştür</button>
    
    <p>Üretilen VM Tabanlı Kod:</p>
    <textarea id="outputCode" readonly></textarea>
    
    <div id="statusBox" class="status">Sistem hazır. Python yükleniyor...</div>

    <script type="py" src="./obfuscator.py"></script>

    <script>
        function setSystemReady() {
            document.getElementById("statusBox").innerText = "Python Altyapısı Hazır!";
            document.getElementById("statusBox").style.color = "#50fa7b";
        }

        function bridgeExecute() {
            try {
                document.getElementById("statusBox").innerText = "Python kodu işliyor...";
                let inputLua = document.getElementById("inputCode").value;
                
                // PyScript üzerinden Python fonksiyonunu tetikle
                let obfuscatedResult = pyscript.runners.get('py').run_js_func('py_obfuscate', inputLua);
                
                document.getElementById("outputCode").value = obfuscatedResult;
                document.getElementById("statusBox").innerText = "Başarılı! VM Kodu Üretildi.";
                document.getElementById("statusBox").style.color = "#50fa7b";
            } catch (err) {
                document.getElementById("statusBox").innerText = "Hata oluştu: " + err.message;
                document.getElementById("statusBox").style.color = "#ff5555";
            }
        }
    </script>
</body>
</html>
