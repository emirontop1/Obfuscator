<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Luau VM Obfuscator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; padding: 30px; }
        textarea { width: 100%; height: 220px; background: #1e1e1e; color: #50fa7b; border: 1px solid #333; font-family: monospace; padding: 12px; box-sizing: border-box; border-radius: 6px; }
        button { padding: 12px 24px; background: #bd93f9; border: none; color: #121212; font-secondary: bold; cursor: pointer; margin: 15px 0; font-weight: bold; border-radius: 4px; }
        button:hover { background: #ff79c6; }
        h2 { color: #bd93f9; }
    </style>
</head>
<body>
    <h2>Luau VM-Level Obfuscator</h2>
    <p>Kaynak Lua Kodunu Yazın:</p>
    <textarea id="inputCode">print("Selam VM dünyasi!")</textarea>
    
    <button onclick="runVMObfuscator()">VM Koduna Dönüştür</button>
    
    <p>Üretilen VM Tabanlı Kod (Korumalı):</p>
    <textarea id="outputCode" readonly></textarea>

    <script src="obfuscator.js"></script>
</body>
</html>
